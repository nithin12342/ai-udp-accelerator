# Harness Engineering: Docker Compose Test Harness
# =================================================
# Creates isolated virtual networks with configurable
# latency and packet loss for AI training and testing.
#
# Usage:
#   docker-compose -f docker-compose.yml up -d
#
# Network Simulation:
#   - Simulates transatlantic cable with 200ms latency
#   - Injects 2% packet loss for failure testing
#   - Provides isolated environment for AI training

version: '3.8'

services:
  # ========================================================================
  # NETWORK SIMULATION (using netem - Linux Traffic Control)
  # ========================================================================
  
  # Network emulator - adds latency and packet loss
  netem-simulator:
    image: netvelocity/netem-simulator:1.0.0
    container_name: netem-simulator
    hostname: netem-simulator
    networks:
      - test-network
    environment:
      - LATENCY_MS=200
      - PACKET_LOSS_PERCENT=2
      - JITTER_MS=10
      - BANDWIDTH_MBPS=1000
    cap_add:
      - NET_ADMIN
    privileged: true
    volumes:
      - ./tc-scripts:/scripts
    command: /scripts/setup-netem.sh
    profiles:
      - network-sim

  # ========================================================================
  # UDP SENDER (Python)
  # ========================================================================
  
  udp-sender:
    build:
      context: .
      dockerfile: Dockerfile.sender
    container_name: udp-sender
    hostname: udp-sender
    networks:
      - test-network
    environment:
      - RECEIVER_HOST=udp-receiver
      - RECEIVER_PORT=9000
      - CONTROL_HOST=control-channel
      - CONTROL_PORT=8080
      - LOG_LEVEL=DEBUG
    depends_on:
      - udp-receiver
      - control-channel
    volumes:
      - ./sender-config:/config
      - ./logs:/logs
    profiles:
      - sender

  # ========================================================================
  # UDP RECEIVER (Java)
  # ========================================================================
  
  udp-receiver:
    build:
      context: .
      dockerfile: Dockerfile.receiver
    container_name: udp-receiver
    hostname: udp-receiver
    networks:
      - test-network
    environment:
      - LISTEN_PORT=9000
      - CONTROL_HOST=control-channel
      - CONTROL_PORT=8080
      - LOG_LEVEL=DEBUG
    depends_on:
      - control-channel
    volumes:
      - ./receiver-config:/config
      - ./logs:/logs
    profiles:
      - receiver

  # ========================================================================
  # CONTROL CHANNEL (TCP API)
  # ========================================================================
  
  control-channel:
    build:
      context: .
      dockerfile: Dockerfile.control
    container_name: control-channel
    hostname: control-channel
    networks:
      - test-network
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LOG_LEVEL=INFO
      - AI_MODEL_PATH=/models/rate_controller.pt
    depends_on:
      - redis
    volumes:
      - ./models:/models
      - ./logs:/logs
    profiles:
      - control

  # ========================================================================
  # AI RATE CONTROLLER
  # ========================================================================
  
  ai-controller:
    build:
      context: .
      dockerfile: Dockerfile.ai
    container_name: ai-controller
    hostname: ai-controller
    networks:
      - test-network
    environment:
      - CONTROL_HOST=control-channel
      - CONTROL_PORT=8080
      - MODEL_TYPE=reinforcement_learning
      - TRAINING_MODE=false
    depends_on:
      - control-channel
      - redis
    volumes:
      - ./models:/models
      - ./training-data:/data
    profiles:
      - ai

  # ========================================================================
  # REDIS (State Storage)
  # ========================================================================
  
  redis:
    image: redis:7-alpine
    container_name: redis
    hostname: redis
    networks:
      - test-network
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb
    volumes:
      - redis-data:/data
    profiles:
      - storage

  # ========================================================================
  # KAFKA (Event Streaming)
  # ========================================================================
  
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    hostname: zookeeper
    networks:
      - test-network
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    profiles:
      - streaming

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    hostname: kafka
    networks:
      - test-network
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    profiles:
      - streaming

  # ========================================================================
  # MONITORING (Prometheus + Grafana)
  # ========================================================================
  
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: prometheus
    hostname: prometheus
    networks:
      - test-network
    ports:
      - "9091:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:10.1.0
    container_name: grafana
    hostname: grafana
    networks:
      - test-network
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/dashboards:/etc/grafana/provisioning/dashboards
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    profiles:
      - monitoring

  # ========================================================================
  # CHAOS ENGINEERING
  # ========================================================================
  
  chaos-mesh:
    image: chaos-mesh/chaos-mesh:latest
    container_name: chaos-mesh
    hostname: chaos-mesh
    networks:
      - test-network
    ports:
      - "2333:2333"
    environment:
      - CLUSTER_MODE=standalone
    profiles:
      - chaos

# ========================================================================
# NETWORKS
# ========================================================================

networks:
  test-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# ========================================================================
# VOLUMES
# ========================================================================

volumes:
  redis-data:
  prometheus-data:
  grafana-data:

# ========================================================================
# PROFILES (for selective startup)
# ========================================================================
# 
# Full test environment:
#   docker-compose up -d
#
# Just sender + receiver:
#   docker-compose --profile sender --profile receiver up -d
#
# With monitoring:
#   docker-compose --profile monitoring up -d
#
# Full stack with chaos testing:
#   docker-compose --profile chaos up -d
